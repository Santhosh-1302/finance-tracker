<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard | Finance Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      color: #333;
    }

    nav {
      background: #1a73e8;
      padding: 14px 30px;
      display: flex;
      align-items: center;
      gap: 20px;
    }
    nav span { color: #fff; font-size: 20px; font-weight: 700; margin-right: auto; }
    nav a {
      color: #fff;
      text-decoration: none;
      font-size: 14px;
      padding: 6px 14px;
      border-radius: 4px;
      transition: background 0.2s;
    }
    nav a:hover, nav a.active { background: rgba(255,255,255,0.2); }

    .container { max-width: 960px; margin: 36px auto; padding: 0 20px; }

    h2 { font-size: 22px; margin-bottom: 24px; color: #1a1a2e; }

    /* User selector */
    .user-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }
    .user-bar label { font-weight: 600; }
    .user-bar select {
      padding: 8px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }

    /* Summary cards */
    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 36px;
    }
    .card {
      background: #fff;
      border-radius: 10px;
      padding: 24px 20px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .card .label { font-size: 13px; color: #666; margin-bottom: 10px; text-transform: uppercase; letter-spacing: .5px; }
    .card .value { font-size: 28px; font-weight: 700; }
    .card.income .value  { color: #2e7d32; }
    .card.expense .value { color: #c62828; }
    .card.balance .value { color: #1565c0; }

    /* Recent lists */
    .reports { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .report-box {
      background: #fff;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .report-box h3 { font-size: 15px; margin-bottom: 14px; color: #444; border-bottom: 1px solid #eee; padding-bottom: 8px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 6px 8px; color: #888; font-weight: 600; }
    td { padding: 7px 8px; border-top: 1px solid #f2f2f2; }
    tr:hover td { background: #fafafa; }
    .no-data { color: #aaa; font-size: 13px; padding: 10px 0; }
  </style>
</head>
<body>

<nav>
  <span>💰 Finance Tracker</span>
  <a href="dashboard.html" class="active">Dashboard</a>
  <a href="user.html">Users</a>
  <a href="income.html">Income</a>
  <a href="expense.html">Expense</a>
</nav>

<div class="container">
  <h2>📊 Financial Dashboard</h2>

  <div class="user-bar">
    <label for="userSelect">View As:</label>
    <select id="userSelect" onchange="loadDashboard()">
      <option value="">-- Select User --</option>
    </select>
  </div>

  <div class="cards">
    <div class="card income">
      <div class="label">Total Income</div>
      <div class="value" id="totalIncome">₹0.00</div>
    </div>
    <div class="card expense">
      <div class="label">Total Expense</div>
      <div class="value" id="totalExpense">₹0.00</div>
    </div>
    <div class="card balance">
      <div class="label">Balance</div>
      <div class="value" id="balance">₹0.00</div>
    </div>
  </div>

  <div class="reports">
    <div class="report-box">
      <h3>📥 Recent Incomes</h3>
      <table>
        <thead><tr><th>Source</th><th>Amount</th><th>Date</th></tr></thead>
        <tbody id="incomeTable"><tr><td colspan="3" class="no-data">Select a user</td></tr></tbody>
      </table>
    </div>
    <div class="report-box">
      <h3>📤 Recent Expenses</h3>
      <table>
        <thead><tr><th>Category</th><th>Amount</th><th>Date</th></tr></thead>
        <tbody id="expenseTable"><tr><td colspan="3" class="no-data">Select a user</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<script>
  const BASE = 'http://localhost:8080/api';

  async function loadUsers() {
    const res  = await fetch(`${BASE}/users`);
    const data = await res.json();
    const sel  = document.getElementById('userSelect');
    data.forEach(u => {
      const opt = document.createElement('option');
      opt.value       = u.id;
      opt.textContent = u.name;
      sel.appendChild(opt);
    });
  }

  async function loadDashboard() {
    const userId = document.getElementById('userSelect').value;
    if (!userId) return;

    // Summary
    const sumRes  = await fetch(`${BASE}/dashboard/summary/${userId}`);
    const summary = await sumRes.json();
    document.getElementById('totalIncome').textContent  = '₹' + Number(summary.totalIncome).toFixed(2);
    document.getElementById('totalExpense').textContent = '₹' + Number(summary.totalExpense).toFixed(2);
    document.getElementById('balance').textContent      = '₹' + Number(summary.balance).toFixed(2);

    // Income list
    const incRes   = await fetch(`${BASE}/incomes/user/${userId}`);
    const incomes  = await incRes.json();
    const incTbody = document.getElementById('incomeTable');
    incTbody.innerHTML = incomes.length === 0
      ? '<tr><td colspan="3" class="no-data">No income records</td></tr>'
      : incomes.slice(-5).reverse().map(i =>
          `<tr><td>${i.source}</td><td>₹${Number(i.amount).toFixed(2)}</td><td>${i.date}</td></tr>`
        ).join('');

    // Expense list
    const expRes   = await fetch(`${BASE}/expenses/user/${userId}`);
    const expenses = await expRes.json();
    const expTbody = document.getElementById('expenseTable');
    expTbody.innerHTML = expenses.length === 0
      ? '<tr><td colspan="3" class="no-data">No expense records</td></tr>'
      : expenses.slice(-5).reverse().map(e =>
          `<tr><td>${e.category}</td><td>₹${Number(e.amount).toFixed(2)}</td><td>${e.date}</td></tr>`
        ).join('');
  }

  loadUsers();
</script>
</body>
</html>
